<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sub2API Cursor Cookie Importer</title>
  <link rel="stylesheet" href="options.css">
</head>
<body>
  <main>
    <h1>Self-hosted Sub2API origins</h1>
    <p>Add an exact HTTPS origin, for example <code>https://sub2api.example.com</code>. The extension requests access only to that origin and registers its bridge content script dynamically.</p>
    <form id="origin-form">
      <label for="origin">HTTPS origin</label>
      <div class="row">
        <input id="origin" name="origin" type="url" required placeholder="https://sub2api.example.com" autocomplete="url">
        <button type="submit">Grant access</button>
      </div>
    </form>
    <p id="status" role="status" aria-live="polite"></p>
    <ul id="origins"></ul>
  </main>
  <script src="shared.js"></script>
  <script src="options.js"></script>
</body>
</html>

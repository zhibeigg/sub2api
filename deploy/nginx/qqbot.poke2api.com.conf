server {
    listen 80;
    listen [::]:80;
    server_name qqbot.poke2api.com;

    location ^~ /.well-known/acme-challenge/ {
        default_type "text/plain";
        root /var/www/letsencrypt;
    }

    location / {
        return 308 https://qqbot.mcwar.cn$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    listen 443 quic;
    listen [::]:443 quic;
    server_name qqbot.poke2api.com;

    ssl_certificate /etc/nginx/certs/qqbot.poke2api.com_cert.pem;
    ssl_certificate_key /etc/nginx/certs/qqbot.poke2api.com_key.pem;

    return 308 https://qqbot.mcwar.cn$request_uri;
}

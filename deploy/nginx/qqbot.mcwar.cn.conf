upstream qqbot_mcwar_backend {
    server 127.0.0.1:8080;
    keepalive 16;
}

server {
    listen 80;
    listen [::]:80;
    server_name qqbot.mcwar.cn;

    location ^~ /.well-known/acme-challenge/ {
        default_type "text/plain";
        root /var/www/letsencrypt;
    }

    location / {
        return 308 https://qqbot.mcwar.cn$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    listen 443 quic;
    listen [::]:443 quic;
    server_name qqbot.mcwar.cn;

    ssl_certificate /etc/nginx/certs/qqbot.mcwar.cn_cert.pem;
    ssl_certificate_key /etc/nginx/certs/qqbot.mcwar.cn_key.pem;

    client_max_body_size 1m;

    location = /webhooks/qq {
        limit_except POST { deny all; }
        proxy_pass http://qqbot_mcwar_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_connect_timeout 5s;
        proxy_read_timeout 15s;
        proxy_send_timeout 15s;
        proxy_buffering off;
        add_header Cache-Control "no-store" always;
    }

    location ~ ^/[0-9]+\.json$ {
        limit_except GET { deny all; }
        proxy_pass http://qqbot_mcwar_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        add_header Cache-Control "no-store" always;
    }

    # QQBot public domain is not an alternate administrator origin.
    location ^~ /api/v1/admin/ {
        return 404;
    }

    location / {
        proxy_pass http://qqbot_mcwar_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Connection "";
        add_header Alt-Svc 'h3=":443"; ma=86400';
    }
}

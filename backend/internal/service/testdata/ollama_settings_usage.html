<!doctype html>
<!--
  Sanitized and trimmed from the real Ollama /settings DOM structure.
  Usage tracks, segments, and local-time class anchors are retained for parser coverage.
  This fixture contains no real account identifiers, browser cookies, or session values.
-->
<html lang="en">
  <head><title>Settings - Ollama</title></head>
  <body>
    <main>
      <section>
        <h2><span>Cloud usage</span><span>max</span></h2>
        <div><div>Balance remaining</div><div>$0</div></div>
      </section>

      <section aria-label="Cloud usage windows">
        <div>
          <div><span>Session usage</span><span>5.6% used</span></div>
          <div data-usage-track>
            <div
              data-usage-segment
              data-model="qwen3-coder:480b-cloud"
              data-requests="3"
              style="width: 3.4%"
            ></div>
            <div
              data-usage-segment
              data-model="gpt-oss:120b-cloud"
              data-requests="2"
              style="width: 2.2%"
            ></div>
          </div>
          <div>Resets in <span class="tabular-nums local-time" data-time="2026-07-23T03:00:00Z">2 hours.</span></div>
        </div>

        <div>
          <div><span>Weekly usage</span><span>14.2% used</span></div>
          <div data-usage-track>
            <div
              data-usage-segment
              data-model="qwen3-coder:480b-cloud"
              data-requests="13"
              style="width: 10.1%"
            ></div>
            <div
              data-usage-segment
              data-model="gpt-oss:120b-cloud"
              data-requests="12"
              style="width: 4.1%"
            ></div>
          </div>
          <div>Resets in <span class="local-time text-xs" data-time="2026-07-29T00:00:00Z">6 days.</span></div>
        </div>
      </section>
    </main>
  </body>
</html>
